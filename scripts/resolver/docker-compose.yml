services:
  # One-shot setup (runs as root): generates /jwt/jwt.hex and chowns the
  # nimbus-data volume to UID 1000 (the user Nimbus runs as inside its image).
  # Without this chown Nimbus gets "Permission denied" on its data dir
  # because docker creates fresh named volumes owned by root.
  init:
    image: alpine:latest
    volumes:
      - jwt:/jwt
      - nimbus-data:/nimbus-data
    command: >
      sh -c '
        set -e;
        if [ ! -f /jwt/jwt.hex ]; then
          apk add --no-cache openssl >/dev/null;
          openssl rand -hex 32 | tr -d "\n" > /jwt/jwt.hex;
          chmod 644 /jwt/jwt.hex;
          echo "Generated /jwt/jwt.hex";
        else
          echo "jwt.hex already exists";
        fi;
        chown 1000:1000 /nimbus-data;
        echo "Chowned /nimbus-data to 1000:1000";
      '
    restart: "no"

  # One-shot: clones the PRIVATE parent repo (brenzi/simplex-namespace-contract)
  # into the shared `src` volume and inits ONLY the ens-subgraph submodule (the
  # subgraph's source). Idempotent: re-runs just refresh the submodule.
  # Requires GITHUB_TOKEN in .env with read access to the parent repo AND the
  # simplex-chat/ens-subgraph submodule. The token is injected at runtime via
  # env, never baked into an image layer or echoed.
  src-clone:
    image: alpine/git:latest
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN required — read access to brenzi/simplex-namespace-contract + simplex-chat/ens-subgraph}
    volumes:
      - src:/src
      - ./init/clone-src.sh:/clone-src.sh:ro
    entrypoint: ["sh", "/clone-src.sh"]
    restart: "no"

  # One-shot: fetches a recent finalised checkpoint into the Nimbus data dir
  # using the trustedNodeSync subcommand. Skipped if the data dir is already
  # initialised, so subsequent compose-ups are no-ops.
  nimbus-checkpoint-sync:
    image: statusim/nimbus-eth2:multiarch-latest
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - nimbus-data:/home/user/nimbus-eth2/build/data
    entrypoint:
      - sh
      - -c
      - |
        if [ -d /home/user/nimbus-eth2/build/data/${NETWORK}/db ]; then
          echo "Nimbus data dir already initialised — skipping checkpoint sync";
          exit 0;
        fi;
        /home/user/nimbus-eth2/build/nimbus_beacon_node trustedNodeSync \
          --network=${NETWORK} \
          --data-dir=/home/user/nimbus-eth2/build/data/${NETWORK} \
          --trusted-node-url=${TRUSTED_NODE_URL} \
          --backfill=false
    restart: "no"

  # One-shot: downloads a pre-synced FULL snapshot into the Reth data dir.
  # Full (not minimal) so the node keeps logs + receipts back to the subgraph
  # start block (25,250,870) — the subgraph indexes from eth_getLogs/receipts.
  # Skipped if the data dir is already initialised — re-runs are no-ops.
  # Privacy note: the snapshot host sees this download (operator existence).
  # Subsequent eth_call traffic stays local.
  # (`reth download` + `--full`/`--resumable` confirmed present in the pinned image.)
  reth-snapshot-init:
    image: ghcr.io/paradigmxyz/reth:latest
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - reth-data:/data
    entrypoint:
      - sh
      - -c
      - |
        if [ -f /data/.snapshot-done ] || [ -d /data/db ]; then
          echo "Reth data already initialised — skipping snapshot download";
          exit 0;
        fi;
        echo "Downloading Reth ${NETWORK} --full snapshot...";
        reth download --datadir /data --chain ${NETWORK} --full --resumable && \
        touch /data/.snapshot-done && \
        echo "Snapshot download complete"
    restart: "no"

  reth:
    image: ghcr.io/paradigmxyz/reth:latest
    depends_on:
      reth-snapshot-init:
        condition: service_completed_successfully
    volumes:
      - reth-data:/data
      - jwt:/jwt:ro
    ports:
      # JSON-RPC for the smp-server (graph-node reaches reth internally on the
      # compose network). Bound to loopback — put Caddy in front for remote access.
      - "127.0.0.1:8545:8545"
      # p2p (Ethereum network). Open these on your firewall for sync.
      - "30303:30303/tcp"
      - "30303:30303/udp"
    # --full (not --minimal): retains logs + receipts so the subgraph can
    # index from block 25,250,870. (`node --full` confirmed in the pinned image.)
    command: >
      node
      --datadir /data
      --chain ${NETWORK}
      --full
      --authrpc.jwtsecret /jwt/jwt.hex
      --authrpc.addr 0.0.0.0 --authrpc.port 8551
      --http
      --http.addr 0.0.0.0 --http.port 8545
      --http.api eth,net
      --rpc.gascap 50000000
      --port 30303
      --discovery.port 30303
    restart: unless-stopped

  nimbus:
    image: statusim/nimbus-eth2:multiarch-latest
    depends_on:
      nimbus-checkpoint-sync:
        condition: service_completed_successfully
    volumes:
      - nimbus-data:/home/user/nimbus-eth2/build/data
      - jwt:/jwt:ro
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "127.0.0.1:5052:5052"
    command: >
      --network=${NETWORK}
      --data-dir=/home/user/nimbus-eth2/build/data/${NETWORK}
      --el=http://reth:8551
      --jwt-secret=/jwt/jwt.hex
      --non-interactive
      --rest --rest-address=0.0.0.0 --rest-port=5052
      --nat=${NAT:-any}
    restart: unless-stopped

  # SNRC REST resolver. Talks to reth on the compose-internal network,
  # exposes /resolve and /health on host 127.0.0.1:8088 (container :8000).
  # Host 8000 is taken by graph-node's GraphQL, hence the 8088 remap.
  # Point the smp-server's [NAMES] resolver_endpoint at http://127.0.0.1:8088.
  resolver:
    build:
      context: ./service
      dockerfile: Dockerfile
    depends_on:
      # reth's `service_started` is sufficient — the resolver tolerates
      # eth_call failures gracefully (returns 502 with the error body), so
      # starting before reth has finished snapshot replay just yields a few
      # 502s until the chain is queryable. The upstream reth image doesn't
      # ship a HEALTHCHECK, so we can't gate on healthy.
      reth:
        condition: service_started
    environment:
      SNRC_RPC: http://reth:8545
      SNRC_BIND: 0.0.0.0
      # Registry addresses cascade through the script's own defaults
      # (mainnet `.testing`; `.simplex` unconfigured). Set explicitly here
      # only if you're deploying against a different network or contract.
      # SNRC_REGISTRY_TESTING: 0x...
      # SNRC_REGISTRY_SIMPLEX: 0x...
    ports:
      - "127.0.0.1:8088:8000"
    restart: unless-stopped

  # ----- Subgraph indexer stack (graph-node + IPFS + Postgres) -----
  # Based on simplex-namespace-contract/scripts/subgraph/docker-compose.yml,
  # adapted so `ethereum:` points at the in-stack reth instead of a host RPC.
  # Images track :latest. The rainbow-table seed in subgraph-deploy.sh is
  # required for graph-node >= 0.30 (incl. latest), which throws on an empty
  # ens_names table instead of returning null.

  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - '127.0.0.1:8000:8000'  # GraphQL HTTP (subgraph queries; host-published)
      - '127.0.0.1:8001:8001'  # GraphQL WS
      - '127.0.0.1:8020:8020'  # JSON-RPC admin (graph create/deploy)
      - '127.0.0.1:8030:8030'  # Subgraph indexing-status
      - '127.0.0.1:8040:8040'  # Prometheus metrics
    depends_on:
      ipfs:
        condition: service_started
      postgres:
        condition: service_healthy
      reth:
        condition: service_started
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: ${POSTGRES_PASSWORD:-let-me-in}
      postgres_db: graph-node
      ipfs: 'ipfs:5001'
      # Network name MUST be `mainnet` to match the `network: mainnet`
      # entries in subgraph.yaml. The provider is the in-stack reth node.
      ethereum: 'mainnet:http://reth:8545'
      GRAPH_LOG: info
      ETHEREUM_REORG_THRESHOLD: 50
    restart: unless-stopped

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - '127.0.0.1:5001:5001'
    volumes:
      - ipfs-data:/data/ipfs
    restart: unless-stopped

  postgres:
    image: postgres:18
    command: ["postgres", "-cshared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-let-me-in}
      POSTGRES_DB: graph-node
      # The Graph requires the C locale + collation for deterministic index
      # ordering; mismatched locales produce wrong query results.
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node -d graph-node"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # One-shot: seeds the ENS rainbow table BEFORE the subgraph deploys, so
  # graph-node can heal label hashes as it indexes (labels indexed before the
  # seed are NOT retroactively healed). graph-node creates public.ens_names via
  # a startup migration; the script waits for it. Stock postgres image for psql;
  # re-runnable (INSERTs are ON CONFLICT DO NOTHING).
  rainbow-seed:
    image: postgres:18
    depends_on:
      graph-node:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: graph-node
      PGDATABASE: graph-node
      PGPASSWORD: ${POSTGRES_PASSWORD:-let-me-in}
    volumes:
      - ./init/rainbow-seed.sh:/rainbow-seed.sh:ro
    entrypoint: ["bash", "/rainbow-seed.sh"]
    restart: "no"

  # One-shot: builds + deploys the SNRC subgraph to graph-node (codegen/create/
  # deploy). Automates docs/subgraph-local.md step 3. Runs after rainbow-seed so
  # the rainbow table is populated before indexing starts. Stock node image +
  # mounted script; re-runnable (create "already exists" is ignored).
  subgraph-deploy:
    image: node:22-bookworm
    depends_on:
      graph-node:
        condition: service_started
      src-clone:
        condition: service_completed_successfully
      rainbow-seed:
        condition: service_completed_successfully
    volumes:
      - src:/src
      - ./init/subgraph-deploy.sh:/subgraph-deploy.sh:ro
    entrypoint: ["bash", "/subgraph-deploy.sh"]
    restart: "no"

volumes:
  reth-data:
  nimbus-data:
  jwt:
  src:
  postgres-data:
  ipfs-data:
