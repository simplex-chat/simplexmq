<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="monospace" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999" />
    </marker>
    <marker id="arr-x" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828" />
    </marker>
  </defs>

  <!-- ===== ROW 0: APPLICATION (external) ===== -->
  <rect x="350" y="10" width="180" height="34" rx="4"
        fill="#fce8e6" stroke="#ea4335" />
  <text x="440" y="32" text-anchor="middle">Application</text>

  <!-- subQ queue box (right of Application) -->
  <rect x="560" y="10" width="120" height="34" rx="4"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="620" y="25" text-anchor="middle" font-weight="bold">subQ</text>
  <text x="620" y="39" text-anchor="middle" font-size="9">(TBQueue)</text>

  <!-- subQ -> Application -->
  <line x1="560" y1="27" x2="532" y2="27"
        stroke="#333" marker-end="url(#arr)" />

  <!-- subQ intake: polyline from columns up right margin to subQ -->
  <polyline points="936,340 948,340 948,27 682,27"
            fill="none" stroke="#333" marker-end="url(#arr)" />
  <text x="936" y="230" font-size="10" fill="#555">all threads</text>
  <text x="936" y="242" font-size="10" fill="#555">write subQ</text>

  <!-- ===== App -> API arrows (down) ===== -->
  <line x1="400" y1="44" x2="170" y2="62"
        stroke="#999" marker-end="url(#arr-g)" />
  <line x1="440" y1="44" x2="480" y2="62"
        stroke="#999" marker-end="url(#arr-g)" />
  <line x1="480" y1="44" x2="786" y2="62"
        stroke="#999" marker-end="url(#arr-g)" />

  <!-- ===== ROW 1: API FUNCTIONS ===== -->

  <!-- SMP API -->
  <rect x="25" y="62" width="290" height="50" rx="4"
        fill="#f4f4f4" stroke="#999" />
  <text x="170" y="80" text-anchor="middle" font-size="10">sendMessage, createConnection</text>
  <text x="170" y="95" text-anchor="middle" font-size="10">joinConnection, subscribe...</text>

  <!-- XFTP API -->
  <rect x="335" y="62" width="290" height="50" rx="4"
        fill="#f4f4f4" stroke="#999" />
  <text x="480" y="80" text-anchor="middle" font-size="10">xftpSendFile</text>
  <text x="480" y="95" text-anchor="middle" font-size="10">xftpReceiveFile...</text>

  <!-- NTF API -->
  <rect x="641" y="62" width="290" height="50" rx="4"
        fill="#f4f4f4" stroke="#999" />
  <text x="786" y="80" text-anchor="middle" font-size="10">registerNtfToken</text>
  <text x="786" y="95" text-anchor="middle" font-size="10">toggleConnectionNtfs...</text>

  <!-- ===== ROW 2: THREE PROTOCOL COLUMNS ===== -->

  <!-- ====== SMP COLUMN ====== -->
  <rect x="20" y="126" width="305" height="230" rx="6"
        fill="none" stroke="#888" stroke-dasharray="6,3" />
  <text x="30" y="140" fill="#888" font-size="10">SMP</text>

  <!-- msgQ queue box (inside SMP column, at top) -->
  <rect x="200" y="146" width="110" height="30" rx="4"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="255" y="160" text-anchor="middle" font-weight="bold" font-size="10">msgQ</text>
  <text x="255" y="172" text-anchor="middle" font-size="8">(TBQueue)</text>

  <!-- subscriber (green, singleton) -->
  <rect x="35" y="146" width="150" height="44" rx="4"
        fill="#e6f4ea" stroke="#34a853" />
  <text x="110" y="164" text-anchor="middle">subscriber</text>
  <text x="110" y="178" text-anchor="middle" font-size="9" fill="#666">(reads msgQ)</text>

  <!-- msgQ -> subscriber -->
  <line x1="200" y1="164" x2="187" y2="164"
        stroke="#333" marker-end="url(#arr)" />

  <!-- SMP worker pools label -->
  <text x="35" y="210" fill="#888" font-size="9">worker pools (on-demand, one per queue / connection / session)</text>

  <!-- delivery worker -->
  <rect x="35" y="220" width="128" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="99" y="237" text-anchor="middle" font-size="11">delivery</text>
  <text x="99" y="250" text-anchor="middle" font-size="8" fill="#666">(per send queue)</text>

  <!-- asyncCmd worker -->
  <rect x="175" y="220" width="135" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="242" y="237" text-anchor="middle" font-size="11">asyncCmd</text>
  <text x="242" y="250" text-anchor="middle" font-size="8" fill="#666">(per conn + server)</text>

  <!-- smpSub worker -->
  <rect x="35" y="272" width="128" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="99" y="289" text-anchor="middle" font-size="11">smpSub</text>
  <text x="99" y="302" text-anchor="middle" font-size="8" fill="#666">(per session)</text>

  <!-- ====== XFTP COLUMN ====== -->
  <rect x="335" y="126" width="296" height="230" rx="6"
        fill="none" stroke="#888" stroke-dasharray="6,3" />
  <text x="345" y="140" fill="#888" font-size="10">XFTP</text>

  <!-- XFTP worker pools label -->
  <text x="345" y="210" fill="#888" font-size="9">worker pools (on-demand, one per server)</text>

  <!-- xftpRcv worker -->
  <rect x="350" y="220" width="130" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="415" y="237" text-anchor="middle" font-size="11">xftpRcv</text>
  <text x="415" y="250" text-anchor="middle" font-size="8" fill="#666">(per server + local)</text>

  <!-- xftpSnd worker -->
  <rect x="490" y="220" width="130" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="555" y="237" text-anchor="middle" font-size="11">xftpSnd</text>
  <text x="555" y="250" text-anchor="middle" font-size="8" fill="#666">(per server + local)</text>

  <!-- xftpDel worker -->
  <rect x="350" y="272" width="130" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="415" y="289" text-anchor="middle" font-size="11">xftpDel</text>
  <text x="415" y="302" text-anchor="middle" font-size="8" fill="#666">(per server)</text>

  <!-- ====== NTF COLUMN ====== -->
  <rect x="641" y="126" width="295" height="230" rx="6"
        fill="none" stroke="#888" stroke-dasharray="6,3" />
  <text x="651" y="140" fill="#888" font-size="10">NTF</text>

  <!-- ntfSubQ queue box (inside NTF column, at top) -->
  <rect x="836" y="146" width="88" height="30" rx="4"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="880" y="160" text-anchor="middle" font-weight="bold" font-size="10">ntfSubQ</text>
  <text x="880" y="172" text-anchor="middle" font-size="8">(TBQueue)</text>

  <!-- ntfSupervisor (green, singleton) -->
  <rect x="656" y="146" width="168" height="44" rx="4"
        fill="#e6f4ea" stroke="#34a853" />
  <text x="740" y="164" text-anchor="middle">ntfSupervisor</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#666">(reads ntfSubQ)</text>

  <!-- ntfSubQ -> ntfSupervisor -->
  <line x1="836" y1="164" x2="826" y2="164"
        stroke="#333" marker-end="url(#arr)" />

  <!-- NTF API -> ntfSubQ -->
  <line x1="860" y1="112" x2="880" y2="144"
        stroke="#333" marker-end="url(#arr)" />

  <!-- NTF worker pools label -->
  <text x="656" y="210" fill="#888" font-size="9">worker pools (on-demand, one per server)</text>

  <!-- ntfWorkers -->
  <rect x="656" y="220" width="125" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="718" y="237" text-anchor="middle" font-size="11">ntfWorkers</text>
  <text x="718" y="250" text-anchor="middle" font-size="8" fill="#666">(per NTF server)</text>

  <!-- ntfSMP worker -->
  <rect x="793" y="220" width="128" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="857" y="237" text-anchor="middle" font-size="11">ntfSMP</text>
  <text x="857" y="250" text-anchor="middle" font-size="8" fill="#666">(per SMP server)</text>

  <!-- ntfTknDel worker -->
  <rect x="656" y="272" width="125" height="38" rx="4"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="718" y="289" text-anchor="middle" font-size="11">ntfTknDel</text>
  <text x="718" y="302" text-anchor="middle" font-size="8" fill="#666">(per NTF server)</text>

  <!-- ===== CROSS-PROTOCOL: asyncCmd -> ntfSubQ (ICQDelete) ===== -->
  <polyline points="310,236 490,168 834,168"
            fill="none" stroke="#c62828" stroke-dasharray="4,3" marker-end="url(#arr-x)" />
  <text x="490" y="160" font-size="9" fill="#c62828">ntfSubQ (queue rotation)</text>

  <!-- ===== CROSS-PROTOCOL: ntfSMP -> smpClients ===== -->
  <polyline points="857,258 857,400 170,400 170,464"
            fill="none" stroke="#c62828" stroke-dasharray="4,3" marker-end="url(#arr-x)" />
  <text x="500" y="396" font-size="9" fill="#c62828">ntfSMP uses smpClients</text>

  <!-- ===== SHARED SINGLETON THREADS ===== -->
  <text x="30" y="378" fill="#888" font-size="9">shared singletons (all green run in raceAny_)</text>
  <rect x="250" y="366" width="135" height="24" rx="4"
        fill="#e6f4ea" stroke="#34a853" />
  <text x="317" y="382" text-anchor="middle" font-size="10">cleanupManager</text>

  <rect x="400" y="366" width="135" height="24" rx="4"
        fill="#e6f4ea" stroke="#34a853" />
  <text x="467" y="382" text-anchor="middle" font-size="10">logServersStats</text>

  <!-- ===== ROW 3: CENTRAL STATE ===== -->
  <rect x="25" y="404" width="450" height="46" rx="4"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="250" y="424" text-anchor="middle" font-weight="bold">Store</text>
  <text x="250" y="440" text-anchor="middle" font-size="10">(SQLite / Postgres)</text>

  <rect x="490" y="404" width="445" height="46" rx="4"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="712" y="424" text-anchor="middle" font-weight="bold">Operation State</text>
  <text x="712" y="440" text-anchor="middle" font-size="10">(5-op suspension cascade)</text>

  <!-- store access: representative dashed line -->
  <line x1="242" y1="258" x2="220" y2="402"
        stroke="#555" stroke-dasharray="3,2" marker-end="url(#arr)" />
  <text x="245" y="340" font-size="9" fill="#555">store</text>

  <!-- ===== ROW 4: PROTOCOL CLIENT POOLS ===== -->
  <rect x="25" y="464" width="290" height="46" rx="4"
        fill="#fce8e6" stroke="#ea4335" />
  <text x="170" y="484" text-anchor="middle">smpClients</text>
  <text x="170" y="500" text-anchor="middle" font-size="9" fill="#666">(TMap SMPTransportSession)</text>

  <rect x="335" y="464" width="290" height="46" rx="4"
        fill="#fce8e6" stroke="#ea4335" />
  <text x="480" y="484" text-anchor="middle">xftpClients</text>
  <text x="480" y="500" text-anchor="middle" font-size="9" fill="#666">(TMap XFTPTransportSession)</text>

  <rect x="641" y="464" width="290" height="46" rx="4"
        fill="#fce8e6" stroke="#ea4335" />
  <text x="786" y="484" text-anchor="middle">ntfClients</text>
  <text x="786" y="500" text-anchor="middle" font-size="9" fill="#666">(TMap NtfTransportSession)</text>

  <!-- ===== ROW 5: EXTERNAL ROUTERS ===== -->
  <text x="170" y="536" text-anchor="middle" font-size="9" fill="#999">SMP Routers</text>
  <line x1="170" y1="510" x2="170" y2="526"
        stroke="#999" marker-end="url(#arr-g)" />

  <text x="480" y="536" text-anchor="middle" font-size="9" fill="#999">XFTP Routers</text>
  <line x1="480" y1="510" x2="480" y2="526"
        stroke="#999" marker-end="url(#arr-g)" />

  <text x="786" y="536" text-anchor="middle" font-size="9" fill="#999">NTF Routers</text>
  <line x1="786" y1="510" x2="786" y2="526"
        stroke="#999" marker-end="url(#arr-g)" />

  <!-- ===== msgQ: smpClients -> subscriber (left margin) ===== -->
  <polyline points="25,487 8,487 8,160 33,160"
            fill="none" stroke="#333" marker-end="url(#arr)" />
  <text x="1" y="178" font-size="10" fill="#555">msgQ</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="554" width="920" height="60" rx="4"
        fill="none" stroke="#ddd" />

  <rect x="35" y="568" width="14" height="11" rx="2"
        fill="#e8f0fe" stroke="#4285f4" />
  <text x="55" y="578" font-size="10">on-demand worker</text>

  <rect x="185" y="568" width="14" height="11" rx="2"
        fill="#e6f4ea" stroke="#34a853" />
  <text x="205" y="578" font-size="10">singleton thread</text>

  <rect x="325" y="568" width="14" height="11" rx="2"
        fill="#fef7e0" stroke="#f9ab00" />
  <text x="345" y="578" font-size="10">queue / state</text>

  <rect x="445" y="568" width="14" height="11" rx="2"
        fill="#fce8e6" stroke="#ea4335" />
  <text x="465" y="578" font-size="10">external connection</text>

  <rect x="595" y="568" width="14" height="11" rx="2"
        fill="#f4f4f4" stroke="#999" />
  <text x="615" y="578" font-size="10">API entry point</text>

  <line x1="730" y1="573" x2="770" y2="573"
        stroke="#c62828" stroke-dasharray="4,3" marker-end="url(#arr-x)" />
  <text x="780" y="577" font-size="10">cross-protocol</text>

  <text x="35" y="604" font-size="10" fill="#666">
    Solid arrows: TBQueue flow.  Dashed grey: store access.  Dashed red: cross-protocol link.  Workers use clients in their column.
  </text>

</svg>
