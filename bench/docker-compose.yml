services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: smp
      POSTGRES_DB: smp_bench
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smp -d smp_bench"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
